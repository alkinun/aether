name: deploy client.sh

# Publishes scripts/aethercompute-client.sh to https://aethercompute.org/client.sh
# via GitHub Pages. The served site (client.sh + CNAME) is assembled fresh on
# every run, so the repo itself stays clean — the script below is the only
# source of truth.

on:
  push:
    branches: [main]
    paths:
      - scripts/aethercompute-client.sh
      - scripts/aethercompute-seed.sh
      - .github/workflows/deploy-client.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-client
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: assemble site
        run: |
          mkdir -p site
          cp scripts/aethercompute-client.sh site/client.sh
          cp scripts/aethercompute-seed.sh site/seed.sh
          printf 'aethercompute.org\n' > site/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
