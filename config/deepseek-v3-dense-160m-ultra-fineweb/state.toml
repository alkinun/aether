run_id = "ds-v3-dense-160m-ufw"
run_state = "WaitingForMembers"

[config]
warmup_time = 30
cooldown_time = 10
epoch_time = 120
max_round_train_time = 30
round_witness_time = 10
min_clients = 2
init_min_clients = 2
global_batch_size_start = 8
global_batch_size_end = 8
global_batch_size_warmup_tokens = 0
verification_percent = 0
witness_nodes = 1
total_steps = 2000
waiting_for_members_extra_time = 3

[model.LLM]
architecture = "HfDeepseek"
data_type = "Pretraining"
max_seq_len = 512
cold_start_warmup_steps = 0

[model.LLM.data_location]
Preprocessed = "data/ultra-fineweb-deepseek-512"

[model.LLM.checkpoint.Hub]
repo_id = "checkpoints/deepseek-v3-dense-160m-init"

[model.LLM.lr_schedule.Cosine]
base_lr = 3.0e-4
warmup_steps = 100
warmup_init_lr = 0.0
total_steps = 2000
final_lr = 3.0e-5

[model.LLM.optimizer.Distro]
clip_grad_norm = 1.0
compression_decay = 0.999
compression_chunk = 64
compression_topk = 8
quantize_1bit = true
weight_decay = 0.1
